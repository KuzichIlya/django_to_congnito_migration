services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 5

  fastapi-app:
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      # Forward host-shell AWS credentials when running on an EC2/ECS instance
      # or when credentials are supplied via the shell rather than .env.
      # These are no-ops if the variables are already set by env_file above.
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
